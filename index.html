    function applySolluxQuirk(text) {
        return text
            .replace(/\bto\b/gi, 'two')

            .replace(/\btwo\b/gi, 'two')
            .replace(/s/g, '2')

    const quirkElements = document.querySelectorAll('.quirk-me');

    function renderText(quirkOff) {
        quirkElements.forEach(el => {

                el.innerHTML = el.getAttribute('data-normal');
            } else {
                el.innerHTML = el.getAttribute('data-quirked');
            }
        });
    }

        toggleBtn.textContent = savedQuirkState === 'true' ? 'QUIRK: OFF' : 'QUIRK: ON';
    }

        toggleBtn.addEventListener('click', () => {
            let currentState = localStorage.getItem('quirkOff') === 'true';
            let newState = !currentState;
            
            localStorage.setItem('quirkOff', newState.toString());
            toggleBtn.textContent = newState ? 'QUIRK: OFF' : 'QUIRK: ON';
            renderText(newState.toString());
        });
