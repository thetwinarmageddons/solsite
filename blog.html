<script>
    const titles = ["now you get two", "hear me", "ramble!"];
    let currentIndex = 0;
    setInterval(() => {
        document.title = titles[currentIndex];
        currentIndex = (currentIndex + 1) % titles.length;
    }, 2000);

    function applySolluxQuirk(text) {
        return text
            .replace(/\bto\b/gi, 'two')
            .replace(/\btoo\b/gi, 'two')
            .replace(/\btwo\b/gi, 'two')
            .replace(/s/g, '2')
            .replace(/S/g, '2')
            .replace(/i/g, 'ii')
            .replace(/I/g, 'ii');
    }

    const quirkElements = document.querySelectorAll('.quirk-me');
    const toggleBtn = document.getElementById('quirkToggle');
    
    quirkElements.forEach(el => {
        const originalHTML = el.innerHTML; 
        el.setAttribute('data-normal', originalHTML);
        el.setAttribute('data-quirked', applySolluxQuirk(originalHTML));
    });

    function renderText(quirkOff) {
        quirkElements.forEach(el => {
            if (quirkOff === 'true') {
                el.innerHTML = el.getAttribute('data-normal');
            } else {
                el.innerHTML = el.getAttribute('data-quirked');
            }
        });
    }

    let savedQuirkState = localStorage.getItem('quirkOff') || 'false';
    if (toggleBtn) {
        toggleBtn.textContent = savedQuirkState === 'true' ? 'QUIRK: OFF' : 'QUIRK: ON';
    }
    renderText(savedQuirkState);

    if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            let currentState = localStorage.getItem('quirkOff') === 'true';
            let newState = !currentState;
            
            localStorage.setItem('quirkOff', newState.toString());
            toggleBtn.textContent = newState ? 'QUIRK: OFF' : 'QUIRK: ON';
            renderText(newState.toString());
        });
    }
</script>
